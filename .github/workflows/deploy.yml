name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: |
          rm -rf ./to_deploy
          npm run build
          npm run deploy-files
          test -f ./to_deploy/index.html
          test -f ./to_deploy/offline/jquery-3.4.1.min.js
          test -f ./to_deploy/offline/select2.min.css
          test -f ./to_deploy/offline/select2.min.js
          ! grep -q "offline version" ./to_deploy/index.html
          find ./to_deploy -maxdepth 2 -type f | sort | head -100

      - name: Deploy to archiso86.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}
          external_repository: archiso86/archiso86.github.io
          publish_branch: main
          publish_dir: ./to_deploy
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
