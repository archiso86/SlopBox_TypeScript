<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" type="image/x-icon" href="./favicon.ico" />
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>slopbox</title>
	<meta name="application-name" content="slopbox" />
	<meta name="apple-mobile-web-app-title" content="slopbox" />
	<meta name="description" content="slopbox is a music editor that aims to add a crap ton of presets." />
	<meta name="keywords" content="chiptune, instrumental, music, song, melody, composition, tool, free, online, square wave, NES, NSF, slopbox, ultrabox, beepbox, jummbox, pandorasbox, modbox, sandbox, goldbox, wackybox, todbox" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="theme-color" content="#ad7760" />
	<meta name="msapplication-TileColor" content="#ad7760" />
	<meta name="msapplication-config" content="/browserconfig.xml" />
	<meta name="format-detection" content="telephone=no" />
	<meta property="og:image" content="./icon.png" />
	<style type="text/css">
		@font-face {
			font-family: "B612";
			font-style: normal;
			font-weight: 400;
			src: url(3JnySDDxiSz36j6yGQ.woff2) format("woff2");
			unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
		}

		html {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
			background: var(--page-margin, black);
			font-size: large;
			font-family: "B612", sans-serif;
			line-height: 1.3;
			color: var(--primary-text, white);
		}

		body {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
			background: var(--editor-background, black);
			font-family: "B612", sans-serif;
		}

		#beepboxEditorContainer {
			box-sizing: border-box;
			width: 100%;
			height: 100vh;
			overflow: auto;
			background: var(--editor-background, black);
			color: var(--primary-text, white);
		}
	</style>
</head>
<body id="secondImage">
	<script>
		"use strict";

		const image = localStorage.getItem("customTheme2");
		const bodyElement = document.getElementById("secondImage");
		if (image != null && image !== "null" && image !== "undefined") {
			bodyElement.style.backgroundImage = "url(" + image + ")";
			bodyElement.style.backgroundRepeat = "repeat";
		}
	</script>
	<div id="beepboxEditorContainer">
		<noscript>Sorry, slopbox requires a JavaScript-enabled browser.</noscript>
	</div>
	<script>
		"use strict";

		const inOfflineSource = /(^|\/)offline(\/|$)/.test(location.pathname);
		const dependencyRoots = inOfflineSource ? ["./"] : ["./offline/", "./"];
		const editorRoot = inOfflineSource ? "../" : "./";

		function loadCss(href) {
			const link = document.createElement("link");
			link.rel = "stylesheet";
			link.href = href;
			document.head.appendChild(link);
		}

		function loadScript(src) {
			return new Promise((resolve, reject) => {
				const script = document.createElement("script");
				script.src = src;
				script.onload = resolve;
				script.onerror = reject;
				document.head.appendChild(script);
			});
		}

		function loadDependencies(rootIndex) {
			const dependencyRoot = dependencyRoots[rootIndex];
			if (dependencyRoot == undefined) return Promise.reject();

			loadCss(dependencyRoot + "select2.min.css");
			return loadScript(dependencyRoot + "jquery-3.4.1.min.js")
				.then(() => loadScript(dependencyRoot + "select2.min.js"))
				.catch(() => loadDependencies(rootIndex + 1));
		}

		function browserHasRequiredFeatures() {
			if (window.AudioContext == undefined && window.webkitAudioContext == undefined) return false;

			try {
				eval("class T {}");
				eval("const a = () => 0");
				eval("for (const a of []);");
			} catch (error) {
				return false;
			}

			return true;
		}

		if (browserHasRequiredFeatures()) {
			loadDependencies(0)
				.then(() => loadScript(editorRoot + "beepbox_editor.min.js"))
				.catch(() => {
					document.getElementById("beepboxEditorContainer").textContent = "Sorry, slopbox failed to load.";
				});
		} else {
			document.getElementById("beepboxEditorContainer").textContent = "Sorry, slopbox doesn't support your browser. Try a recent version of Chrome, Firefox, Edge, Safari, or Opera.";
		}
	</script>
</body>
</html>
